kind = "web"
previewPath = "/"
title = "CreditDNA"
version = "1.0.0"
id = "artifacts/creditdna"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18934
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/creditdna run dev"

[services.env]
PORT = "18934"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/creditdna", "run", "build"]
publicDir = "artifacts/creditdna/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
