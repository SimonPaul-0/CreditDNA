<script>
/* ── DB ─────────────────────────────────────────── */
const DB = {
  users: () => JSON.parse(localStorage.getItem('cdn_users') || '[]'),
  saveUsers: u => localStorage.setItem('cdn_users', JSON.stringify(u)),
  user: () => { try { return JSON.parse(localStorage.getItem('cdn_user')); } catch { return null; } },
  saveUser: u => localStorage.setItem('cdn_user', JSON.stringify(u)),
  clearUser: () => localStorage.removeItem('cdn_user')
};

let PAGE = 'landing', USER = DB.user(), THREE_KILL = null;

/* ── TOAST ──────────────────────────────────────── */
let _tt;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const c = { success: '#00ff41', error: '#ff4444', warning: '#ffcc00', info: '#44bbff' }[type] || '#00ff41';
  el.style.borderLeftColor = c; el.style.borderColor = c;
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(_tt); _tt = setTimeout(() => el.style.display = 'none', 3200);
}

/* ── ROUTER ─────────────────────────────────────── */
function go(p) {
  if (['dashboard', 'profile', 'check'].includes(p) && !USER) { toast('Please login first', 'warning'); p = 'login'; }
  PAGE = p; renderNav(); render(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── THREE.JS DNA ───────────────────────────────── */
function initThree(id) {
  if (THREE_KILL) { THREE_KILL(); THREE_KILL = null; }
  const canvas = document.getElementById(id); if (!canvas) return;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, 1, .1, 1000);
  camera.position.z = 7;
  const resize = () => {
    const w = canvas.parentElement.clientWidth, h = canvas.parentElement.clientHeight;
    renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
  };
  resize(); window.addEventListener('resize', resize);

  const hg = new THREE.Group(), N = 80, s1 = [], s2 = [];
  for (let i = 0; i < N; i++) {
    const t = i / N * Math.PI * 8, r = 2;
    s1.push(new THREE.Vector3(Math.cos(t) * r, i / N * 14 - 7, Math.sin(t) * r));
    s2.push(new THREE.Vector3(Math.cos(t + Math.PI) * r, i / N * 14 - 7, Math.sin(t + Math.PI) * r));
  }
  const ln = (pts, c, o) => { const g = new THREE.BufferGeometry().setFromPoints(pts); return new THREE.Line(g, new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: o })); };
  hg.add(ln(s1, 0x00ff41, .55)); hg.add(ln(s2, 0x44ffcc, .35));
  for (let i = 0; i < N; i += 5) {
    hg.add(ln([s1[i], s2[i]], 0x00ff41, .15));
    [s1[i], s2[i]].forEach(p => { const m = new THREE.Mesh(new THREE.SphereGeometry(.09, 6, 6), new THREE.MeshBasicMaterial({ color: 0x00ff41, transparent: true, opacity: .75 })); m.position.copy(p); hg.add(m); });
  }
  scene.add(hg);
  scene.add(new THREE.Mesh(new THREE.IcosahedronGeometry(3.8, 0), new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true, transparent: true, opacity: .05 })));
  const pp = new Float32Array(400 * 3);
  for (let i = 0; i < 400; i++) { pp[i * 3] = (Math.random() - .5) * 26; pp[i * 3 + 1] = (Math.random() - .5) * 26; pp[i * 3 + 2] = (Math.random() - .5) * 10; }
  const pg = new THREE.BufferGeometry(); pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
  scene.add(new THREE.Points(pg, new THREE.PointsMaterial({ color: 0x00ff41, size: .05, transparent: true, opacity: .4 })));

  let mx = 0, my = 0;
  const onM = e => { mx = (e.clientX / window.innerWidth - .5) * 2; my = -(e.clientY / window.innerHeight - .5) * 2; };
  window.addEventListener('mousemove', onM);
  let t = 0, raf;
  const anim = () => { raf = requestAnimationFrame(anim); t += .003; hg.rotation.y = t * .3 + mx * .05; hg.rotation.x = my * .03; renderer.render(scene, camera); };
  anim();
  THREE_KILL = () => { cancelAnimationFrame(raf); window.removeEventListener('mousemove', onM); window.removeEventListener('resize', resize); renderer.dispose(); };
}

/* ── AUTH ───────────────────────────────────────── */
function doLogin(email, pass) {
  const u = DB.users().find(u => u.email === email && u.password === pass);
  if (u) { DB.saveUser(u); USER = u; toast(`Welcome back, ${u.name.split(' ')[0]}! 🧬`); go('dashboard'); return true; }
  return false;
}
function doRegister(data) {
  const users = DB.users();
  if (users.find(u => u.email === data.email)) { toast('Email already registered', 'error'); return false; }
  const u = { ...data, id: Date.now(), joined: new Date().toISOString(), score: null };
  users.push(u); DB.saveUsers(users); DB.saveUser(u); USER = u;
  toast(`Welcome to CreditDNA, ${u.name.split(' ')[0]}! 🧬`); go('dashboard'); return true;
}
function doLogout() { DB.clearUser(); USER = null; toast('Logged out successfully', 'info'); go('landing'); }

/* ── NAV ────────────────────────────────────────── */
function renderNav() {
  const p = PAGE;
  const lnk = (id, label) => `<button class="nav-btn ${p === id ? 'active' : ''}" onclick="go('${id}')">${label}</button>`;
  let h = lnk('landing', 'Home') + lnk('how', 'How It Works') + lnk('pricing', 'For Banks');
  if (USER) {
    h += lnk('dashboard', 'Dashboard') + lnk('check', 'My Score') + lnk('profile', USER.name.split(' ')[0]);
    h += `<button onclick="doLogout()" style="font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:1.5px;border:1.5px solid rgba(255,68,68,.4);color:#ff8888;padding:8px 16px;cursor:pointer;background:transparent;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)">Logout</button>`;
  } else {
    h += `<button class="nav-btn" onclick="go('login')">Login</button>`;
    h += `<button onclick="go('register')" style="font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:1.5px;border:1.5px solid #00ff41;color:#010a04;background:#00ff41;padding:9px 20px;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)" onmouseover="this.style.background='#00cc33'" onmouseout="this.style.background='#00ff41'">Get Your Score</button>`;
  }
  document.getElementById('nav-links').innerHTML = h;
}

function calcScore() {
  const vals = ['q1','q2','q3','q4','q5'].map(id => parseInt(document.getElementById(id).value));
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const score = Math.round(300 + (avg/10)*600 + (Math.random()*30 - 15));
  const clampedScore = Math.min(900, Math.max(300, score));
  const tier = clampedScore>=750?'Very Good':clampedScore>=650?'Good':clampedScore>=550?'Fair':'Poor';
  const color = clampedScore>=750?'#00ff41':clampedScore>=650?'#44ffcc':clampedScore>=550?'#ffdd44':'#ff7777';

  // Save score to user
  const users = DB.users();
  const idx = users.findIndex(u => u.id === USER.id);
  if (idx !== -1) { users[idx].score = clampedScore; DB.saveUsers(users); }
  USER.score = clampedScore; DB.saveUser(USER);

  document.getElementById('score-form').style.display = 'none';
  document.getElementById('score-result').style.display = 'block';
  document.getElementById('score-result').innerHTML = `
  <div class="card" style="padding:36px;text-align:center;border-color:${color}35;animation:pulse 2.5s infinite;margin-bottom:18px">

    <div style="font-family:Orbitron,sans-serif;font-size:88px;font-weight:900;color:${color};line-height:1;text-shadow:0 0 32px ${color}50;animation:scoreIn .8s ease">${clampedScore}</div>
    <div style="font-family:Orbitron,sans-serif;font-size:16px;color:${color};letter-spacing:3px;margin:8px 0 20px">${tier.toUpperCase()} ●</div>

      <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(200,240,212,.35);margin-bottom:6px"><span>300</span><span>900</span></div>
      <div style="height:10px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden">
        <div style="height:100%;width:${((clampedScore-300)/600*100).toFixed(0)}%;background:${color};border-radius:100px"></div>
      </div>
    </div>
    <p style="font-size:14px;color:rgba(200,240,212,.55);line-height:1.8;max-width:440px;margin:0 auto 26px">
      ${clampedScore>=750?'Excellent financial behaviour! You qualify for premium credit products with the best interest rates.'
        :clampedScore>=650?'Good standing. You qualify for most personal loans and credit products. A few improvements can unlock even better rates.'
        :clampedScore>=550?'Fair score. You can access some credit products. Focus on utility payment regularity to improve your score.'
