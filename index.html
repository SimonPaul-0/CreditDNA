<script>
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}
const v = (name) => `var(${name})`;
const THEME_KEY = 'cdna_theme';
const inlineThemeColors = [
  ['background:#1a1208', `background:${v('--bg-dark-section')}`],
  ['color:#1a1208', `color:${v('--ink')}`],
  ['rgba(250,246,236,.55)', v('--ink-muted')],
  ['rgba(250,246,236,.5)', v('--stats-text')],
  ['rgba(250,246,236,.2)', v('--auth-footer')],
  ['rgba(255,254,249,.97)', v('--bg-mobile-menu')],
  ['rgba(255,254,249,.92)', v('--bg-nav')],
  ['#fffef9', v('--bg')], ['#ffffff', v('--bg-card')], ['#fff0e8', v('--privacy-box-bg')],
  ['#fff0ed', v('--feature-red')], ['#fef8e6', v('--feature-yellow')], ['#f0f7ff', v('--feature-blue')],
  ['#e8f0fb', v('--feature-blue')], ['#e8f5ef', v('--green-bg')], ['#fdecea', v('--msg-err-bg')],
  ['#faf8f3', v('--bg-input')], ['#faf6ec', v('--ink')], ['#f5f0e8', v('--bg-alt')],
  ['#e8e0d0', v('--border')], ['#d4c9b5', v('--border-2')],
  ['#4a3f30', v('--ink-2')], ['#8c7d6a', v('--ink-3')], ['#fff', v('--bg-card')]
];

function normalizeInlineThemeColors(root = document) {
  const elements = [];
  if (root.nodeType === Node.ELEMENT_NODE && root.hasAttribute('style')) elements.push(root);
  elements.push(...root.querySelectorAll('[style]'));
  elements.forEach((element) => {
    let style = element.getAttribute('style');
    inlineThemeColors.forEach(([from, to]) => { style = style.split(from).join(to); });
    element.setAttribute('style', style);
  });
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem(THEME_KEY, theme);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#050d05' : '#fffef9');
  normalizeInlineThemeColors();
  window.dispatchEvent(new Event('cdna-theme-change'));
}

window._toggleTheme = function() {
  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
  renderNav(PAGE, go);
};

applyTheme(localStorage.getItem(THEME_KEY) || 'light');

const ADMIN_EMAILS = ['simon@creditdna.in', 'mayank@creditdna.in'];
const OCC_LABELS = { gig: 'Gig Worker', farmer: 'Farmer', student: 'Student', sme: 'Business Owner', daily: 'Daily Wage Worker', freelance: 'Freelancer', salaried: 'Salaried Employee', other: 'Other' };

const scoreColor = s => !s ? '#8c7d6a' : s >= 750 ? '#0f7e5a' : s >= 650 ? '#0d7c52' : s >= 550 ? '#d4500f' : '#c0392b';
const scoreTier = s => !s ? '—' : s >= 750 ? 'Very Good' : s >= 650 ? 'Good' : s >= 550 ? 'Fair' : 'Poor';
const scorePct = s => !s ? 0 : ((s - 300) / 600 * 100);
const isAdmin = u => !!(u && ADMIN_EMAILS.includes((u.email || '').toLowerCase()));

const KEYS = { USERS: 'cdna_users', ME: 'cdna_me' };
const DB = {
  users: () => { try { return JSON.parse(localStorage.getItem(KEYS.USERS) || '[]'); } catch { return []; } },
  save: u => localStorage.setItem(KEYS.USERS, JSON.stringify(u)),
  me: () => { try { return JSON.parse(localStorage.getItem(KEYS.ME) || 'null'); } catch { return null; } },
  setMe: u => localStorage.setItem(KEYS.ME, JSON.stringify(u)),
  logout: () => localStorage.removeItem(KEYS.ME),
  findByEmail: email => DB.users().find(u => u.email.toLowerCase() === email.toLowerCase()),
  updateUser: patch => { const users = DB.users(); const i = users.findIndex(u => u.id === patch.id); if (i > -1) { users[i] = { ...users[i], ...patch }; DB.save(users); const me = DB.me(); if (me && me.id === patch.id) DB.setMe(users[i]); return users[i]; } return null; },
  deleteUser: id => { const users = DB.users().filter(u => u.id !== id); DB.save(users); },
};

function generateBankApiKey() {
  const bytes = new Uint8Array(20);
  crypto.getRandomValues(bytes);
  return 'cdna_live_' + [...bytes].map(b => b.toString(16).padStart(2, '0')).join('');
}

/** Ensures the signed-in user has a lender API key (demo / integration ID stored locally). */
function ensureBankApiKey() {
  const u = DB.me();
  if (!u) return '';
  if (u.bankApiKey && String(u.bankApiKey).length >= 20) return u.bankApiKey;
  const key = generateBankApiKey();
  DB.updateUser({ id: u.id, bankApiKey: key });
  const me = DB.me();
  return (me && me.bankApiKey) ? me.bankApiKey : key;
}

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { ok: '#0f7e5a', err: '#c0392b', info: '#d4500f' };
  const color = colors[type] || colors.info;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${msg}`;
  el.appendChild(item);
  setTimeout(() => { item.style.opacity = '0'; item.style.transition = 'opacity .3s'; setTimeout(() => item.remove(), 300); }, 3000);
}

const OCR_MAX_PDF_PAGES = 40;

function isPdfFile(file) {
  return file.type === 'application/pdf' || /\.pdf$/i.test(file.name || '');
}

async function loadPdfFromFile(file) {
  if (!window.pdfjsLib) throw new Error('PDF support not loaded. Refresh the page.');
  const buf = await file.arrayBuffer();
  return pdfjsLib.getDocument({ data: buf }).promise;
}

async function rasterizePdfPage(pdf, pageIndex1Based) {
  const page = await pdf.getPage(pageIndex1Based);
  const scale = Math.min(2.5, 1200 / page.getViewport({ scale: 1 }).width);
  const viewport = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return canvas.toDataURL('image/png');
}

/** Preview + single-page rasterize: first PDF page or image data URL. */
async function rasterizeFileToDataUrl(file) {
  if (isPdfFile(file)) {
    const pdf = await loadPdfFromFile(file);
    return rasterizePdfPage(pdf, 1);
  }
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Could not read image file'));
    r.readAsDataURL(file);
  });
}

/**
 * All raster images to OCR: one entry per PDF page (capped) or one image file.
 * Regular image uploads are always a single frame (PNG/JPEG/WebP, etc.).
 */
async function getOcrPageImages(file) {
  if (isPdfFile(file)) {
    const pdf = await loadPdfFromFile(file);
    const total = pdf.numPages || 1;
    const n = Math.min(total, OCR_MAX_PDF_PAGES);
    const dataUrls = [];
    for (let i = 1; i <= n; i++) {
      dataUrls.push(await rasterizePdfPage(pdf, i));
    }
    return {
      dataUrls,
      pdfTotalPages: total,
      pdfScannedPages: n,
      pdfTruncated: total > n,
    };
  }
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Could not read image file'));
    r.readAsDataURL(file);
  });
  return { dataUrls: [dataUrl], pdfTotalPages: 0, pdfScannedPages: 1, pdfTruncated: false };
}

function parseStatementFromOcrText(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const amounts = [];
  const seen = new Set();
  const addAmt = (n) => {
    if (n >= 0 && n < 1e12 && !seen.has(n)) { seen.add(n); amounts.push(n); }
  };
  const rupeeRe = /(?:₹|Rs\.?\s*|INR\s*)([\d][\d,]*(?:\.\d{1,2})?)/gi;
  let m;
  while ((m = rupeeRe.exec(text)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (!Number.isNaN(n)) addAmt(n);
  }
  const decRe = /\b([\d]{1,3}(?:,\d{2,3})*(?:\.\d{2}))\b/g;
  while ((m = decRe.exec(text)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (!Number.isNaN(n) && n >= 100 && n % 1 !== 0) addAmt(n);
  }
  amounts.sort((a, b) => b - a);
  const ifscList = [...text.matchAll(/\b[A-Z]{4}0[A-Z0-9]{6}\b/g)].map(x => x[0]);
  const ifscUnique = [...new Set(ifscList)];
  const acctMasked = [...text.matchAll(/\b(?:XX+\d{4}|\*{4,}\d{4}|\d{4}\*{4,})\b/g)].slice(0, 3);
  const dates = [...text.matchAll(/\b(\d{1,2}[/-]\d{1,2}[/-]\d{2,4}|\d{4}[/-]\d{1,2}[/-]\d{1,2})\b/g)].map(x => x[1]).slice(0, 5);
  const flags = {
    hasUpi: /\bUPI\b|@[a-z0-9._-]+\./i.test(text),
    hasBankKeywords: /\b(balance|statement|account|credit|debit|transfer|NEFT|RTGS|IMPS)\b/i.test(text),
    hasIfsc: ifscUnique.length > 0,
    hasDate: dates.length > 0,
  };
  return {
    lineCount: lines.length,
    charCount: text.length,
    amounts: amounts.slice(0, 12),
    ifsc: ifscUnique.slice(0, 3),
    dates,
    acctHints: acctMasked.map(x => x[0]),
    flags,
    previewLines: lines.slice(0, 8),
  };
}

function scoreFromOcrInsights(ins) {
  const { lineCount, charCount, amounts, flags } = ins;
  const amountCount = amounts.length;
  const maxAmount = amounts[0] || 0;
  let pts = 300;
  pts += Math.min(160, lineCount * 5);
  pts += Math.min(80, Math.floor(charCount / 80));
  pts += Math.min(140, amountCount * 18);
  if (maxAmount > 0) pts += Math.min(90, Math.log10(maxAmount + 1) * 22);
  if (flags.hasUpi) pts += 38;
  if (flags.hasBankKeywords) pts += 38;
  if (flags.hasIfsc) pts += 28;
  if (flags.hasDate) pts += 22;
  return Math.min(900, Math.max(300, Math.round(pts)));
}

function insightBulletsFromParsed(ins) {
  const out = [];
  if (ins.amounts.length) out.push(`Found ${ins.amounts.length} likely currency value(s)`);
  else out.push('No obvious ₹ / Rs amounts — check raw text below');
  if (ins.flags.hasUpi) out.push('UPI-style references detected');
  if (ins.flags.hasBankKeywords) out.push('Bank / statement keywords found');
  if (ins.ifsc.length) out.push(`IFSC-like codes: ${ins.ifsc.join(', ')}`);
  if (ins.dates.length) out.push(`Date-like strings: ${ins.dates.slice(0, 3).join(', ')}`);
  if (!ins.flags.hasBankKeywords && ins.lineCount < 5) out.push('Very little text — try a sharper photo or higher contrast');
  while (out.length < 4) out.push('Review extracted text for your own details');
  return out.slice(0, 4);
}

function doLogin(email, password) {
  const user = DB.findByEmail(email);
  if (!user || user.password !== password) return null;
  DB.setMe(user);
  return user;
}

function doRegister(data) {
  if (DB.findByEmail(data.email)) { toast('This email is already registered', 'err'); return false; }
  const isAdm = ADMIN_EMAILS.includes(data.email.toLowerCase());
  const user = { id: Date.now(), name: data.name, email: data.email.toLowerCase(), password: data.password, phone: data.phone || '', occ: data.occ, txn: data.txn, upiApp: data.upiApp, isAdmin: isAdm, score: null, bankApiKey: null, joined: new Date().toISOString() };
  const users = DB.users();
  users.push(user);
  DB.save(users);
  DB.setMe(user);
  toast(isAdm ? '👑 Admin account created!' : '🎉 Welcome!', 'ok');
  return user;
}

window._copyBankApiKey = function () {
  const el = document.getElementById('bank-api-key-input');
  const t = el && el.value;
  if (!t) { toast('Nothing to copy', 'err'); return; }
  const done = () => toast('API key copied', 'ok');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(done).catch(() => {
      try {
        el.focus();
        el.select();
        document.execCommand('copy');
        done();
      } catch (e) {
        toast('Could not copy — select the key manually', 'err');
      }
    });
  } else {
    try {
      el.focus();
      el.select();
      document.execCommand('copy');
      done();
    } catch (e) {
      toast('Could not copy — select the key manually', 'err');
    }
  }
};

window._regenerateBankApiKey = function () {
  const u = DB.me();
  if (!u) { toast('Sign in first', 'err'); return; }
  if (!confirm('Regenerate your lender API key? You must update any integrations that still use the old key.')) return;
  DB.updateUser({ id: u.id, bankApiKey: generateBankApiKey() });
  toast('New API key generated', 'ok');
  window._go('pricing');
};

    const prevBox = document.getElementById('preview-container');

  input.onchange = (e) => { const file = e.target.files[0]; if (file) showPreview(file); };

  const dropzone = document.getElementById('dropzone');
  dropzone.ondragover = (e) => { e.preventDefault(); dropzone.style.borderColor = '#d4500f'; };

    if (file) showPreview(file);
  };
}

async function startOCR() {
  const btn = document.getElementById('extract-btn');
  const file = window._ocrFile;
  if (!file) {
    toast('Choose or drop a document first', 'err');
    return;
  }
  if (typeof Tesseract === 'undefined') {
    toast('OCR library failed to load. Check your connection and refresh.', 'err');
    return;
  }

  btn.innerHTML = '⏳ Preparing image…';
  btn.disabled = true;
  const t0 = performance.now();

  try {
    const { dataUrls, pdfTotalPages, pdfScannedPages, pdfTruncated } = await getOcrPageImages(file);
    const nPages = dataUrls.length;
    const parts = [];
    for (let p = 0; p < nPages; p++) {
      btn.innerHTML = nPages > 1
        ? `⏳ PDF page ${p + 1} of ${nPages}…`
        : '⏳ Scanning text (first run downloads language data)…';
      const { data } = await Tesseract.recognize(dataUrls[p], 'eng', {
        logger: (ev) => {
          if (ev.status === 'recognizing text' && typeof ev.progress === 'number') {
            const pct = Math.round(ev.progress * 100);
            btn.innerHTML = nPages > 1
              ? `⏳ Page ${p + 1}/${nPages} · OCR ${pct}%`
              : `⏳ OCR ${pct}%`;
          }
        },
      });
      const chunk = (data && data.text) ? data.text.trim() : '';
      if (chunk) {
        if (pdfTotalPages > 0) {
          parts.push(`--- PDF page ${p + 1}${pdfTotalPages > 1 ? ` of ${pdfTotalPages}` : ''} ---\n${chunk}`);
        } else {
          parts.push(chunk);
        }
      }
    }

    let rawText = parts.join('\n\n').trim();
    if (!rawText) {
      throw new Error('No text was read from this document. Try better lighting, less blur, or a higher resolution scan.');
    }
    if (pdfTruncated) {
      rawText += `\n\n[Note: Only the first ${pdfScannedPages} of ${pdfTotalPages} PDF pages were scanned (limit ${OCR_MAX_PDF_PAGES}).]`;
    }

    const parsed = parseStatementFromOcrText(rawText);
    const derivedScore = scoreFromOcrInsights(parsed);
    const c = scoreColor(derivedScore);
    const tier = scoreTier(derivedScore);
    const bullets = insightBulletsFromParsed(parsed);
    const secs = ((performance.now() - t0) / 1000).toFixed(1);
    const fieldApprox = Math.min(99, parsed.lineCount + parsed.amounts.length + parsed.ifsc.length + parsed.dates.length);
    const pageNote = pdfTotalPages > 1
      ? `${pdfScannedPages} PDF page(s) scanned${pdfTruncated ? ` (${pdfTotalPages} total)` : ''}`
      : '1 page';

    toast(`✅ OCR complete<br>${fieldApprox}+ signals · ${pageNote} · ${secs}s`, 'ok');

    const u = DB.me();
    const users = DB.users();
    const i = users.findIndex(user => user.id === u.id);
    if (i > -1) {
      users[i].score = derivedScore;
      DB.save(users);
      DB.setMe(users[i]);
    }

    const amountsHtml = parsed.amounts.length
      ? parsed.amounts.slice(0, 6).map(a => `<span style="display:inline-block;margin:4px 8px 0 0;padding:6px 10px;background:#fff;border-radius:8px;border:1px solid #e8e0d0;font-weight:600;">₹${a.toLocaleString('en-IN')}</span>`).join('')
      : '<span style="color:#8c7d6a;font-size:13px;">None matched — see raw text</span>';

    document.getElementById('success-panel').innerHTML = `
      <div class="cdna-card" style="padding:32px;border-top:4px solid ${c};">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:16px;">
          <div>
            <div style="font-size:13px;font-weight:700;color:#8c7d6a;">EXTRACTED FROM YOUR DOCUMENT</div>
            <div style="font-size:12px;color:#8c7d6a;margin-top:6px;">${parsed.lineCount} lines · ${parsed.charCount} characters${pdfTotalPages > 1 ? ` · ${pdfScannedPages}/${pdfTotalPages} PDF page(s)${pdfTruncated ? ' (truncated)' : ''}` : ''}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:13px;color:#8c7d6a;">SCORE FROM DOCUMENT SIGNALS</div>
            <div style="font-size:52px;font-weight:800;color:${c};line-height:1;">${derivedScore}</div>
            <div style="font-size:15px;color:${c};font-weight:600;">${tier}</div>
          </div>
        </div>

        <div style="background:#faf8f3;border-radius:12px;padding:18px;margin-bottom:16px;">
          <div style="font-size:13px;color:#8c7d6a;margin-bottom:10px;">Detected amounts</div>
          <div style="display:flex;flex-wrap:wrap;">${amountsHtml}</div>
        </div>

        <div style="background:#faf8f3;border-radius:12px;padding:18px;margin-bottom:20px;">
          <div style="font-size:13px;color:#8c7d6a;margin-bottom:8px;">Key insights (from OCR text)</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;">
            ${bullets.map(b => `<div>✅ ${escapeHTML(b)}</div>`).join('')}
          </div>
        </div>

        <details style="margin-bottom:20px;border:1px solid #e8e0d0;border-radius:12px;padding:14px 16px;background:#fff;">
          <summary style="cursor:pointer;font-weight:600;color:#1a1208;font-size:14px;">Raw extracted text</summary>
          <pre style="margin:14px 0 0;font-size:12px;line-height:1.5;color:#4a3f30;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto;">${escapeHTML(rawText)}</pre>
        </details>

        <button onclick="window._go('dashboard')" class="btn-primary btn-full" style="border-radius:12px;">
          Add to Dashboard →
        </button>
      </div>`;

    document.getElementById('success-panel').style.display = 'block';
    document.getElementById('preview-container').style.opacity = '0.6';
  } catch (err) {
    const msg = (err && err.message) ? err.message : String(err);
    toast(msg, 'err');
  } finally {
    btn.innerHTML = '🔍 Extract Text';
    btn.disabled = false;
  }
}

function initDNA(canvas) {
  if (!window.THREE) return;
  stopHeroDNAIfRunning();
  const scene = new THREE.Scene();
  let W = canvas.clientWidth || 400, H = canvas.clientHeight || 600;
  const camera = new THREE.PerspectiveCamera(40, W / H, 0.08, 120);
  camera.position.set(0, 0.15, 8.4);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);

  scene.add(new THREE.AmbientLight(0xfff5eb, 0.38));
  const key = new THREE.DirectionalLight(0xffffff, 0.78);
  key.position.set(5, 8, 10);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xa7f3d0, 0.32);
  fill.position.set(-6, -2, -4);
  scene.add(fill);
  const rimOrange = new THREE.PointLight(0xd4500f, 1, 24);
  rimOrange.position.set(-2, -5, 7);
  scene.add(rimOrange);
  const rimGreen = new THREE.PointLight(0x22c55e, 1.15, 20);
  rimGreen.position.set(5, 3, 5);
  scene.add(rimGreen);

  const helix = new THREE.Group();
  scene.add(helix);

  const TURNS = 3.85, HEIGHT = 6.1, RADIUS = 1.12, CURVE_SEG = 140;
  const ptsA = [], ptsB = [];
  for (let i = 0; i <= CURVE_SEG; i++) {
    const t = i / CURVE_SEG;
    const ang = t * TURNS * Math.PI * 2;
    const y = t * HEIGHT - HEIGHT / 2;
    ptsA.push(new THREE.Vector3(Math.cos(ang) * RADIUS, y, Math.sin(ang) * RADIUS));
    ptsB.push(new THREE.Vector3(Math.cos(ang + Math.PI) * RADIUS, y, Math.sin(ang + Math.PI) * RADIUS));
  }
  const curveA = new THREE.CatmullRomCurve3(ptsA);
  const curveB = new THREE.CatmullRomCurve3(ptsB);

  const matStrandA = new THREE.MeshStandardMaterial({
    color: 0x22c55e,
    emissive: 0x064e3b,
    emissiveIntensity: 0.5,
    metalness: 0.28,
    roughness: 0.32,
    transparent: true,
    opacity: 0,
  });
  const matStrandB = new THREE.MeshStandardMaterial({
    color: 0x15803d,
    emissive: 0x022c1f,
    emissiveIntensity: 0.45,
    metalness: 0.22,
    roughness: 0.38,
    transparent: true,
    opacity: 0,
  });

  const tubeSegs = 220;
  const tubeRad = 0.001;
  helix.add(new THREE.Mesh(new THREE.TubeGeometry(curveA, tubeSegs, tubeRad, 10, false), matStrandA));
  helix.add(new THREE.Mesh(new THREE.TubeGeometry(curveB, tubeSegs, tubeRad, 10, false), matStrandB));

  const rungGeo = new THREE.CylinderGeometry(0.032, 0.032, 1, 8);
  rungGeo.rotateZ(Math.PI / 2);
  const matRung = new THREE.MeshStandardMaterial({
    color: getComputedStyle(document.documentElement).getPropertyValue('--helix-connector').trim(),
    emissive: getComputedStyle(document.documentElement).getPropertyValue('--helix-connector').trim(),
    emissiveIntensity: 0.28,
    metalness: 0.18,
    roughness: 0.35,
    transparent: true,
    opacity: 0.86,
  });
  const updateConnectorColor = () => {
    const connector = getComputedStyle(document.documentElement).getPropertyValue('--helix-connector').trim();
    matRung.color.set(connector);
    matRung.emissive.set(connector);
  };
  window.addEventListener('cdna-theme-change', updateConnectorColor);

  const PAIRS = 26;
  const xAxis = new THREE.Vector3(1, 0, 0);
  const currencySprite = (symbol, flag, highlighted) => {
    const label = document.createElement('canvas');
    label.width = 192; label.height = 96;
    const context = label.getContext('2d');
    context.fillStyle = highlighted ? 'rgba(212,80,15,.96)' : 'rgba(5,48,30,.78)';
    context.roundRect(4, 4, 184, 88, 24); context.fill();
    context.fillStyle = '#ffffff'; context.font = 'bold 34px Plus Jakarta Sans, sans-serif'; context.textAlign = 'center';
    context.fillText(`${flag} ${symbol}`, 96, 59);
    const texture = new THREE.CanvasTexture(label);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false }));
    sprite.scale.set(highlighted ? 0.92 : 0.7, highlighted ? 0.46 : 0.35, 1);
    return sprite;
  };
  for (let p = 0; p < PAIRS; p++) {
    const u = p / (PAIRS - 1);
    const a = curveA.getPointAt(u);
    const b = curveB.getPointAt(u);
    const mid = a.clone().add(b).multiplyScalar(0.5);
    const dir = b.clone().sub(a);
    const len = dir.length();
    dir.normalize();
    const rung = new THREE.Mesh(rungGeo, matRung);
    rung.position.copy(mid);
    rung.scale.set(len, 1, 1);
    rung.quaternion.setFromUnitVectors(xAxis, dir);
    helix.add(rung);
    const currencyA = V2.currencies[(p * 2) % V2.currencies.length];
    const currencyB = V2.currencies[(p * 2 + 1) % V2.currencies.length];
    const badgeA = currencySprite(currencyA[1], currencyA[2], currencyA[0] === V2.country);
    const badgeB = currencySprite(currencyB[1], currencyB[2], currencyB[0] === V2.country);
    badgeA.position.copy(a);
    badgeB.position.copy(b);
    helix.add(badgeA, badgeB);
  }

  const orbitRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.35, 0.014, 10, 96),
    new THREE.MeshBasicMaterial({ color: 0xd4500f, transparent: true, opacity: 0.28 }),
  );
  orbitRing.rotation.x = Math.PI / 2.65;
  orbitRing.rotation.y = 0.35;
  helix.add(orbitRing);

  const innerRing = new THREE.Mesh(
    new THREE.TorusGeometry(2.05, 0.01, 8, 64),
    new THREE.MeshBasicMaterial({ color: 0x4ade80, transparent: true, opacity: 0.22 }),
  );
  innerRing.rotation.x = Math.PI / 2.1;
  helix.add(innerRing);

  const particleWrap = new THREE.Group();
  scene.add(particleWrap);
  const particleCount = window.innerWidth < 768 ? 60 : 160;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 9;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 8.5;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const pMat = new THREE.PointsMaterial({
    color: 0x4ade80,
    size: 0.045,
    transparent: true,
    opacity: 0.42,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  particleWrap.add(new THREE.Points(pGeo, pMat));

  let mouseX = 0, mouseY = 0;
  const onMove = (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  };
  window.addEventListener('mousemove', onMove);

  let ro;
  if (typeof ResizeObserver !== 'undefined') {
    ro = new ResizeObserver(() => {
      W = canvas.clientWidth || 400;
      H = canvas.clientHeight || 600;
      if (W < 2 || H < 2) return;
      camera.aspect = W / H;
      camera.updateProjectionMatrix();
      renderer.setSize(W, H);
    });
    ro.observe(canvas);
  }

  let frame = 0;
  const animate = () => {
    frame = requestAnimationFrame(animate);
    const t = performance.now() * 0.001;
    helix.rotation.y = t * 0.26 + mouseX * 0.32;
    helix.rotation.x = mouseY * 0.11 + Math.sin(t * 0.22) * 0.04;
    helix.position.y = Math.sin(t * 0.38) * 0.1;
    orbitRing.rotation.z = t * 0.12;
    innerRing.rotation.z = -t * 0.18;
    particleWrap.rotation.y = t * 0.04;
    rimGreen.intensity = 1.15 + Math.sin(t * 1.4) * 0.25;
    rimOrange.intensity = 1 + Math.sin(t * 1.1 + 1) * 0.2;
    renderer.render(scene, camera);
  };
  animate();

  let disposed = false;
  const dispose = () => {
    if (disposed) return;
    disposed = true;
    window._cdnaStopHero3D = null;
    cancelAnimationFrame(frame);
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('cdna-theme-change', updateConnectorColor);
    if (ro) ro.disconnect();
    renderer.dispose();
    scene.traverse((obj) => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose && m.dispose());
        else if (obj.material.dispose) obj.material.dispose();
      }
    });
  };
  window._cdnaStopHero3D = dispose;
}

function translateRenderedCopy(root = document) {
  root.querySelectorAll('input[placeholder], textarea[placeholder], [title]').forEach((element) => {
    if (element.placeholder) element.placeholder = tCopy(element.placeholder);
    if (element.title) element.title = tCopy(element.title);
  });
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = []; let node;
  while ((node = walker.nextNode())) nodes.push(node);
  nodes.forEach((textNode) => {
    const copy = textNode.nodeValue.trim();
    if (copy && !textNode.parentElement.closest('script,style,pre,code')) textNode.nodeValue = textNode.nodeValue.replace(copy, tCopy(copy));
  });
}

function renderLocaleControls(compact = false) {
  return `<select class="v2-control" aria-label="Language" onchange="window._setLanguage(this.value)">${Object.entries(V2.languages).map(([code, label]) => `<option value="${code}"${V2.language === code ? ' selected' : ''}>${compact ? '🌐 ' : ''}${label}</option>`).join('')}</select>
  <select class="v2-control" aria-label="Country" onchange="window._setCountry(this.value)">${Object.entries(V2.countries).map(([code, country]) => `<option value="${code}"${V2.country === code ? ' selected' : ''}>${country.flag} ${country.label}</option>`).join('')}</select>`;
}

function renderRatesPanel(detailLevel = 'summary') {
  const rates = detailLevel === 'full' ? demoRates() : [['Indicative score band', currentCountry().rate]];
  return `<div class="cdna-card" style="padding:22px;"><div class="label">${detailLevel === 'full' ? 'Demo rate table' : 'Indicative pricing'}</div><div class="v2-rate-grid">${rates.map(([tier, rate]) => `<div style="background:var(--bg-alt);padding:14px;border-radius:10px;"><div style="font-size:12px;color:var(--ink-3);">${tier}</div><div class="font-display font-bold" style="font-size:20px;color:var(--accent);">${rate}</div></div>`).join('')}</div><p style="font-size:11px;color:var(--ink-3);margin:14px 0 0;">Demo / placeholder rates only. Not a lending quote.</p></div>`;
}

function renderRoleRates() {
  const detail = currentRole() === 'user' ? 'summary' : 'full';
  document.getElementById('app').innerHTML = `<div class="v2-shell page-enter"><span class="label">Pricing and rates</span><h1 class="font-display font-extrabold text-ink" style="font-size:32px;">${currentCountry().flag} ${currentCountry().label} lending context</h1><p style="color:var(--ink-2);margin-bottom:20px;">${detail === 'full' ? 'Full role-authorized demo view.' : 'Summary view for your score context.'}</p>${renderRatesPanel(detail)}</div>${renderBottomTabs(currentRole())}`;
}

function renderRoleLogin(go) {
  document.getElementById('app').innerHTML = `<div class="auth-page page-enter"><div class="auth-left"><div><div class="font-display font-extrabold mb-4" style="font-size:40px;color:var(--auth-text);">CreditDNA</div><h2 class="font-display font-extrabold" style="font-size:clamp(28px,3.5vw,40px);color:var(--auth-text);">One platform.<br>Three secure views.</h2><p style="font-size:15px;color:var(--ink-muted);line-height:1.75;margin-top:20px;">Role-aware access for consumers, lenders, and platform administrators.</p></div><div style="font-size:12px;color:var(--auth-footer);">Supabase-ready authentication</div></div><div class="auth-right"><div style="max-width:440px;width:100%;margin:auto;"><span class="label">Secure access</span><h1 class="font-display font-extrabold text-ink" style="font-size:30px;margin-bottom:18px;">Sign in to CreditDNA</h1><div class="auth-tabs role-tabs">${[['user','👤 User'],['bank','🏦 Bank'],['admin','🛡️ Admin']].map(([role,label]) => `<button class="auth-tab${V2.role === role ? ' active' : ''}" onclick="V2.role='${role}';renderRoleLogin(window._go)">${label}</button>`).join('')}</div><div id="v2-login-error"></div><div class="field"><label>${V2.role === 'user' ? 'Registered email, phone, or UPI ID' : V2.role === 'bank' ? 'Institutional email' : 'Administrator email'}</label><input id="v2-identifier" autocomplete="username" placeholder="${V2.role === 'user' ? 'you@domain.com' : V2.role === 'bank' ? 'bank@creditdna.demo' : 'admin@creditdna.demo'}"></div>${V2.role === 'bank' ? '<div class="field"><label>Institution ID</label><input id="v2-institution" placeholder="CDNA-BANK-001"></div>' : ''}<div class="field"><label>Password / secure PIN</label><input id="v2-password" type="password" autocomplete="current-password" placeholder="••••••••"></div>${V2.role === 'admin' ? '<div class="field"><label>Mock 2FA code</label><input id="v2-otp" inputmode="numeric" placeholder="123456"></div>' : ''}<button class="btn-primary btn-full btn-lg" onclick="window._v2Login()">Continue as ${V2.role === 'user' ? 'User' : V2.role === 'bank' ? 'Bank' : 'Admin'} →</button><p style="font-size:12px;color:var(--ink-3);text-align:center;margin-top:16px;">${hasLiveSupabase ? 'Live Supabase authentication is enabled.' : 'Demo mode is active until the publishable key is added.'}</p></div></div></div>`;
}

window._v2Login = async () => {
  const identifier = document.getElementById('v2-identifier').value.trim().toLowerCase();
  const password = document.getElementById('v2-password').value;
  const error = document.getElementById('v2-login-error');
  const expectedInstitution = V2.role === 'bank' ? document.getElementById('v2-institution').value.trim() : '';
  if (!identifier || !password || (V2.role === 'admin' && document.getElementById('v2-otp').value !== '123456')) { error.innerHTML = '<div class="msg-err">Check your credentials and 2FA code.</div>'; return; }
  if (supabaseClient) {
    const { data, error: authError } = await supabaseClient.auth.signInWithPassword({ email: identifier, password });
    if (authError) { error.innerHTML = `<div class="msg-err">${escapeHTML(authError.message)}</div>`; return; }
    const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', data.user.id).single();
    if (!profile || profile.role !== V2.role || (V2.role === 'bank' && profile.institution_id !== expectedInstitution)) { await supabaseClient.auth.signOut(); error.innerHTML = '<div class="msg-err">This account does not have the requested role.</div>'; return; }
    DB.setMe({ id: data.user.id, name: profile.display_name, email: data.user.email, role: profile.role, institutionId: profile.institution_id, score: profile.score, joined: profile.created_at });
  } else {
    DB.setMe({ id: `demo-${V2.role}`, name: `Demo ${V2.role}`, email: identifier, role: V2.role, institutionId: expectedInstitution, score: V2.role === 'user' ? 724 : null, joined: new Date().toISOString() });
  }
  toast(`${V2.role[0].toUpperCase() + V2.role.slice(1)} session ready`, 'ok');
  window._go(V2.role === 'user' ? 'dashboard' : V2.role);
};

function renderRoleDashboard(go) {
  const user = DB.me();
  if (!user) { go('login'); return; }
  const role = currentRole();
  if (role === 'bank') return renderBankDashboard();
  if (role === 'admin') return renderAdminDashboard();
  renderDashboard(go);
}

function renderBankDashboard() {
  document.getElementById('app').innerHTML = `<div class="v2-shell page-enter"><span class="label">Bank workspace</span><h1 class="font-display font-extrabold text-ink" style="font-size:32px;">Portfolio intelligence</h1><p style="color:var(--ink-2);">${currentCountry().flag} ${currentCountry().label} · full demo pricing access</p><div class="v2-kpis">${[['Applicants reviewed','1,248'],['Verified scores','936'],['Portfolio quality','92.4%'],['Avg. decision time','4m 12s']].map(([label,value]) => `<div class="cdna-card" style="padding:18px;"><div style="font-size:12px;color:var(--ink-3);">${label}</div><div class="font-display font-bold" style="font-size:25px;color:var(--green);">${value}</div></div>`).join('')}</div><div class="db-grid"><div class="cdna-card" style="padding:22px;"><div class="label">Applicant lookup</div><input placeholder="UPI ID, consent token, or applicant email"><button class="btn-primary" style="margin-top:12px;" onclick="toast('Demo verification: score 724 · Good','ok')">Verify score</button></div>${renderRatesPanel('full')}</div></div>${renderBottomTabs('bank')}`;
}

function renderAdminDashboard() {
  document.getElementById('app').innerHTML = `<div class="v2-shell page-enter"><span class="label">Admin workspace</span><h1 class="font-display font-extrabold text-ink" style="font-size:32px;">Platform control center</h1><div class="v2-kpis">${[['Registered users','12,840'],['Partner banks','24'],['Scores this month','8,312'],['Audit events','2,048']].map(([label,value]) => `<div class="cdna-card" style="padding:18px;"><div style="font-size:12px;color:var(--ink-3);">${label}</div><div class="font-display font-bold" style="font-size:25px;color:var(--accent);">${value}</div></div>`).join('')}</div><div class="db-grid"><div class="cdna-card" style="padding:22px;"><div class="label">Management</div><button class="btn-outline btn-full" style="margin-bottom:10px;" onclick="toast('Role management is protected by Supabase RLS','info')">Manage user roles</button><button class="btn-outline btn-full" style="margin-bottom:10px;" onclick="toast('Bank onboarding queue opened (demo)','info')">Manage bank institutions</button><button class="btn-outline btn-full" onclick="toast('Audit log export requested (demo)','info')">View audit logs</button><div class="label" style="margin-top:20px;">Adjust demo good-tier rate</div><input id="v2-good-rate" value="${V2.rateOverride?.good || currentCountry().rate}"><button class="btn-primary btn-full" style="margin-top:10px;" onclick="window._saveDemoRate()">Save demo rate</button></div>${renderRatesPanel('full')}</div></div>${renderBottomTabs('admin')}`;
}

window._saveDemoRate = () => { V2.rateOverride = { ...(V2.rateOverride || {}), good: document.getElementById('v2-good-rate').value }; toast('Demo rate table updated for this session', 'ok'); renderAdminDashboard(); };

function renderBottomTabs(role) { return `<div class="v2-bottom-tabs"><button class="nav-link active" onclick="window._go('${role === 'user' ? 'dashboard' : role}')">Overview</button><button class="nav-link" onclick="window._go('pricing')">Rates</button><button class="nav-link" onclick="window._logout()">Sign out</button></div>`; }

let mmOpen = false;
window._toggleMM = () => { mmOpen = !mmOpen; const el = document.getElementById('mobile-menu'); if (el) el.classList.toggle('open', mmOpen); };

function renderNav(page, go) {
  const user = DB.me();
  const role = currentRole();
  const linksEl = document.getElementById('nav-links');
  const logoEl = document.getElementById('logo-btn');
  if (logoEl) logoEl.onclick = () => window._go('landing');
  if (!linksEl) return;

  const lnk = (id, label) => `<button class="nav-link${page === id ? ' active' : ''}" onclick="window._go('${id}')">${label}</button>`;
  let h = lnk('landing', t('home')) + lnk('how', t('how')) + lnk('pricing', t('rates'));
  if (user) {
    h += lnk(role === 'user' ? 'dashboard' : role, role === 'user' ? 'Dashboard' : role === 'bank' ? 'Bank Desk' : 'Admin');
    if (role === 'user') h += lnk('check', 'My Score') + lnk('ocr', 'OCR');
    h += `<button class="btn-danger btn-sm" onclick="window._logout()">Sign out</button>`;
  } else {
    h += lnk('login', t('signIn'));
    h += `<button class="btn-primary btn-sm" onclick="window._go('register')">${t('getStarted')}</button>`;
  }
  h += renderLocaleControls();
  h += `<button id="theme-toggle" onclick="window._toggleTheme()" style="width:36px;height:36px;border-radius:9px;background:var(--bg-alt);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s;" title="Toggle dark mode">${document.documentElement.dataset.theme === 'dark' ? '☀️' : '🌙'}</button>`;
  linksEl.innerHTML = h;
  const mmEl = document.getElementById('mobile-menu');
if (mmEl) {
  const lnkMM = (id, label) => 
    `<button class="mm-item" onclick="window._go('${id}');window._toggleMM()">${label}</button>`;
  let mm = lnkMM('landing',`🏠 ${t('home')}`) + lnkMM('how',`⚙️ ${t('how')}`) + lnkMM('pricing',`🏦 ${t('rates')}`);
  if (user) {
    mm += lnkMM(role === 'user' ? 'dashboard' : role, role === 'user' ? '📊 Dashboard' : role === 'bank' ? '🏦 Bank Desk' : '🛡️ Admin');
    if (role === 'user') mm += lnkMM('check','🎯 My Score') + lnkMM('ocr','📸 OCR Scanner');
    mm += `<button class="mm-item" style="color:#c0392b;" onclick="window._logout();window._toggleMM()">Sign Out</button>`;
  } else {
    mm += lnkMM('login',t('signIn'));
    mm += lnkMM('register',`${t('getStarted')} →`);
  }
  mm += `<div style="display:flex;gap:8px;padding:10px 14px;">${renderLocaleControls(true)}</div>`;
  mm += `<button class="mm-item" onclick="window._toggleTheme();window._toggleMM()" style="display:flex;align-items:center;gap:10px;"><span id="mm-theme-icon">${document.documentElement.dataset.theme === 'dark' ? '☀️' : '🌙'}</span><span id="mm-theme-label">${document.documentElement.dataset.theme === 'dark' ? 'Light Mode' : 'Dark Mode'}</span></button>`;
  mmEl.innerHTML = mm;
}
  window._go = go;
  window._logout = () => { if (supabaseClient) supabaseClient.auth.signOut(); doLogout(); window._go('landing'); };
}

const PAGES = {
  landing: go => renderLanding(go),
  how: go => renderHow(go),
  pricing: () => renderRoleRates(),
  login: go => renderRoleLogin(go),
  register: go => renderRoleLogin(go),
  dashboard: go => renderRoleDashboard(go),
  bank: () => renderBankDashboard(),
  admin: () => renderAdminDashboard(),
  check: go => renderCheck(go),
  ocr: go => renderOCR(go),
  transactions: go => renderTransactions(go),
  profile: go => renderProfile(go),
};

let PAGE = 'landing';

function go(page) {
  stopHeroDNAIfRunning();
  const protected_ = ['dashboard','check','ocr','transactions','profile','bank','admin'];
  if (protected_.includes(page) && !DB.me()) { toast('Sign in first', 'err'); page = 'login'; }
  if ((page === 'bank' || page === 'admin') && currentRole() !== page) { toast('This area is restricted to the selected role', 'err'); page = 'login'; }
  PAGE = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState({ page }, '', `#${page}`);
  renderNav(PAGE, go);
  (PAGES[page] || PAGES.landing)(go);
}

window._go = go;
window.addEventListener('popstate', e => {
  stopHeroDNAIfRunning();
  const page = e.state?.page || 'landing';
  PAGE = page;
  renderNav(PAGE, go);
  (PAGES[page] || PAGES.landing)(go);
});

const hashPage = window.location.hash.replace('#', '') || 'landing';
document.addEventListener('DOMContentLoaded', () => {
  const observer = new MutationObserver((records) => {
    records.forEach((record) => record.addedNodes.forEach((node) => {
      if (node.nodeType === Node.ELEMENT_NODE) { normalizeInlineThemeColors(node); translateRenderedCopy(node); }
    }));
  });
  observer.observe(document.body, { childList: true, subtree: true });
  normalizeInlineThemeColors();
  translateRenderedCopy();
  go(PAGES[hashPage] ? hashPage : 'landing');
});
</script>
</body>
</html>
